<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.cwa.gov.tw/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="中央氣象署首頁風格 SPA — 縣市預報、互動地圖、空氣品質、圖資專區"
    />
    <link rel="stylesheet" href="https://www.cwa.gov.tw/V8/assets/plugins/font-awesome/css/font-awesome.min.css" />
    <link rel="stylesheet" href="https://www.cwa.gov.tw/V8/assets/plugins/cwb-fonticon/style.css" />
    <title>中央氣象署 · 天氣預報</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
